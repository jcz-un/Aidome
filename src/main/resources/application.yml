spring:
  application:
    name: Aidome
  datasource:
    url: jdbc:mysql://localhost:3306/aidome?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  data:
    redis:
      host: 127.0.0.1
      port: 6380
      password: ""
      database: 3
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1
        shutdown-timeout: 100ms
  ai:
    openai:
      api-key: your-openai-api-key
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.7
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7
    vectorstore:
      redis:
        index-name: rag_index
        prefix: rag:vector
        database: 0
    embedding:
      options:
        model: text-embedding-v3

  logging:
    charset:
      console: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
dashscope:
  api-key: ${DASHSCOPE_API_KEY:DASHSCOPE_API_KEY}
server:
  port: 8080
sky:
  alioss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: ${ALIYUN_OSS_BUCKET:ununn-java-ai}